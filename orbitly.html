<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbitly App</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center; /* horizontal center */
      align-items: center;     /* vertical center */
      background-color: #000222;
    }

    .video-container {
      width: 100%;
      max-width: 400px; /* controls video width */
      aspect-ratio: 9 / 16; /* vertical video ratio */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px; 
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video controls>
      <source src="Orbitly App Video.mov" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

</body>
</html>
